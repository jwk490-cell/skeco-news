<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK에코플랜트 뉴스</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
:root{
  --bg:#0a0d13; --surface:#12161f; --line:#232a38; --line2:#1a202b;
  --txt:#e9ecf3; --dim:#8b95a8; --dim2:#5a6478;
  --gold:#c9a24a; --gold-hi:#e0be6e; --gold-soft:rgba(201,162,74,.12); --gold-line:rgba(201,162,74,.38);
  --shadow:0 2px 10px rgba(0,0,0,.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;
  font-family:"Pretendard Variable",Pretendard,"Malgun Gothic","맑은 고딕","Segoe UI",-apple-system,sans-serif}
body{background:var(--bg);color:var(--txt);font-size:14px;min-height:100vh;
  background-image:radial-gradient(1000px 440px at 82% -10%,rgba(201,162,74,.07),transparent 60%);
  background-attachment:fixed}
.wrap{max-width:820px;margin:0 auto;padding:30px 22px 60px}

header{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.mark{width:38px;height:38px;border-radius:10px;flex:none;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#1c2230,#12161f);border:1px solid var(--gold-line);font-size:20px}
h1{font-size:23px;font-weight:800;letter-spacing:-.3px}
h1 .sub{display:block;font-size:10.5px;font-weight:700;letter-spacing:.2em;color:var(--gold);
  text-transform:uppercase;margin-bottom:3px}
.meta{color:var(--dim);font-size:12.5px;margin:14px 0 20px}
.meta b{color:var(--gold-hi)}

.body{display:flex;flex-direction:column;gap:14px}
.wrapsec{background:var(--surface);border:1px solid var(--line);border-radius:13px;
  padding:17px 21px;box-shadow:var(--shadow)}
.wrapsec h3{font-size:14.5px;font-weight:800;display:flex;align-items:center;gap:8px}
.wrapsec ul{margin:11px 0 2px 18px;padding:0}
.wrapsec li{font-size:13px;line-height:1.72;margin-bottom:7px;color:var(--txt)}
.wrapsec li b{color:var(--gold-hi)}
.wrapdiv{font-size:10.5px;font-weight:700;color:var(--dim2);letter-spacing:.1em;
  text-transform:uppercase;margin-top:18px}
.wrapday{background:var(--surface);border:1px solid var(--line);border-radius:13px;
  box-shadow:var(--shadow);overflow:hidden}
.wrapday summary{padding:13px 19px;cursor:pointer;font-size:13.5px;font-weight:700;color:var(--dim);
  list-style:none;display:flex;align-items:center;gap:8px;user-select:none}
.wrapday summary::-webkit-details-marker{display:none}
.wrapday summary::after{content:'▸';margin-left:auto;color:var(--dim2);transition:transform .15s}
.wrapday[open] summary::after{transform:rotate(90deg);color:var(--gold)}
.wrapday summary:hover{color:var(--txt);background:var(--line2)}
.wrapday[open] summary{color:var(--gold-hi);border-bottom:1px solid var(--line)}
.wrapday .inner{padding:6px 19px 16px}

.nlist{margin-top:6px}
.nitem{padding:9px 0;border-bottom:1px solid var(--line2)}
.nitem:last-child{border-bottom:none;padding-bottom:2px}
.nt{font-size:13.5px;font-weight:700;color:var(--txt);text-decoration:none;line-height:1.5}
.nt:hover{color:var(--gold-hi)}
.nmeta{font-size:11.5px;color:var(--dim2);margin-top:2px}
.nsum{font-size:12.5px;color:var(--dim);line-height:1.6;margin-top:4px}
.ncnt{font-size:11px;font-weight:700;color:var(--gold-hi);background:var(--gold-soft);
  border:1px solid var(--gold-line);padding:1px 8px;border-radius:99px;margin-left:2px}
.empty{border:1.5px dashed var(--line);border-radius:13px;padding:48px 24px;text-align:center;
  color:var(--dim2);font-size:13.5px;background:var(--surface)}
.empty b{display:block;font-size:15px;color:var(--dim);margin-bottom:6px}
footer{text-align:center;color:var(--dim2);font-size:11px;margin-top:32px;
  border-top:1px solid var(--line);padding-top:16px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="mark">🏗️</div>
    <h1><span class="sub">Auto News Monitor</span>SK에코플랜트 뉴스</h1>
  </header>
  <div class="meta" id="meta">불러오는 중…</div>
  <div class="body" id="body"></div>
  <footer>SK에코플랜트 언론 보도 자동 모니터 · 하루 4회(00·06·12·18시) 수집·요약 · 단순 정보 제공 목적</footer>
</div>

<script>
const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const md=s=>esc(s).replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');

async function load(){
  const meta=document.getElementById('meta'),body=document.getElementById('body');
  let SKE;
  try{
    const res=await fetch('data/skeco_news.json?t='+Date.now(),{cache:'no-store'});
    if(!res.ok)throw new Error(res.status);
    SKE=await res.json();
  }catch(e){
    meta.textContent='SK에코플랜트 관련 언론 보도를 하루 4회(00·06·12·18시) 자동 수집·요약합니다.';
    body.innerHTML='<div class="empty"><b>아직 수집된 데이터가 없습니다</b>첫 수집 이후 기사가 표시됩니다.</div>';
    return;
  }
  const item=a=>`<div class="nitem"><a class="nt" href="${a.url}" target="_blank" rel="noopener">${esc(a.title)}</a>
    <div class="nmeta">${esc(a.source)}${a.more?` 외 ${a.more}건`:''} · ${esc((a.ts||'').slice(5,16))}</div>
    ${a.summary?`<div class="nsum">${md(a.summary)}</div>`:''}</div>`;
  const checkHtml=c=>`<div class="wrapsec"><h3>🕒 ${esc(c.label)} 체크 <span class="ncnt">신규 ${c.articles.length}건</span></h3>
    ${c.digest&&c.digest.length?`<ul>${c.digest.map(b=>`<li>${md(b)}</li>`).join('')}</ul>`:''}
    <div class="nlist">${c.articles.map(item).join('')}</div></div>`;
  meta.innerHTML=`마지막 체크 <b>${esc(SKE.last_check||'-')}</b> · 신규 ${SKE.last_new!=null?SKE.last_new:'-'}건 · 하루 4회(00·06·12·18시) 자동 체크`;
  let html='';
  const checks=SKE.checks||[];
  if(!checks.length)html+='<div class="empty"><b>아직 수집된 신규 기사가 없습니다</b>다음 체크에서 새 보도가 잡히면 여기에 쌓입니다.</div>';
  else{
    const byDay=[];
    checks.forEach(c=>{const d=c.ts.slice(0,10);const g=byDay.find(x=>x.d===d);g?g.cs.push(c):byDay.push({d,cs:[c]})});
    byDay.forEach((g,i)=>{
      const inner=g.cs.map(checkHtml).join('');
      if(i===0)html+=inner;
      else html+=`<details class="wrapday"><summary>📅 ${esc(g.d)} — 기사 ${g.cs.reduce((n,c)=>n+c.articles.length,0)}건</summary><div class="inner">${inner}</div></details>`;
    });
  }
  if(SKE.bootstrap){
    const b=SKE.bootstrap;
    html+=`<div class="wrapdiv">2026년 보도 정리 — 테마별${b.asof?` (최초 수집 ${esc(b.asof)})`:''}</div>`;
    (b.themes||[]).forEach(t=>{
      html+=`<details class="wrapday"><summary>${esc(t.title)} <span class="ncnt">${(t.articles||[]).length}건</span></summary><div class="inner">
        ${t.summary?`<div class="nsum" style="margin:12px 0 2px">${md(t.summary)}</div>`:''}
        <div class="nlist">${(t.articles||[]).map(a=>`<div class="nitem"><a class="nt" href="${a.url}" target="_blank" rel="noopener">${esc(a.title)}</a>
          <div class="nmeta">${esc(a.source||'-')} · ${esc(a.date||'')}</div>${a.gist?`<div class="nsum">${md(a.gist)}</div>`:''}</div>`).join('')}</div></div></details>`;
    });
  }
  body.innerHTML=html;
}
load();
setInterval(load,5*60*1000);
</script>
</body>
</html>
